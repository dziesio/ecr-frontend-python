<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in — LibeHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            min-height: 100vh;
            margin: 0;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        /* Animated aurora background */
        .aurora {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }
        .aurora-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: .55;
            animation: drift 12s ease-in-out infinite alternate;
        }
        .aurora-blob:nth-child(1) {
            width: 600px; height: 600px;
            background: #2563eb;
            top: -200px; left: -150px;
            animation-delay: 0s;
        }
        .aurora-blob:nth-child(2) {
            width: 500px; height: 500px;
            background: #7c3aed;
            top: -100px; right: -100px;
            animation-delay: -4s;
        }
        .aurora-blob:nth-child(3) {
            width: 400px; height: 400px;
            background: #0ea5e9;
            bottom: -150px; left: 30%;
            animation-delay: -8s;
        }
        @keyframes drift {
            0%   { transform: translate(0, 0) scale(1); }
            50%  { transform: translate(40px, 30px) scale(1.08); }
            100% { transform: translate(-20px, 50px) scale(.95); }
        }

        /* Floating icons */
        .floaties {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .floaty {
            position: absolute;
            font-size: 1.4rem;
            opacity: .12;
            animation: float 8s ease-in-out infinite alternate;
            color: #fff;
        }
        .floaty:nth-child(1)  { top: 12%; left:  8%; animation-delay:  0s; animation-duration: 9s; }
        .floaty:nth-child(2)  { top: 20%; left: 80%; animation-delay: -2s; animation-duration: 7s; }
        .floaty:nth-child(3)  { top: 65%; left:  5%; animation-delay: -5s; animation-duration:11s; }
        .floaty:nth-child(4)  { top: 75%; left: 88%; animation-delay: -3s; animation-duration: 8s; }
        .floaty:nth-child(5)  { top: 42%; left: 92%; animation-delay: -7s; animation-duration:10s; }
        .floaty:nth-child(6)  { top: 88%; left: 40%; animation-delay: -1s; animation-duration: 9s; }
        .floaty:nth-child(7)  { top:  5%; left: 50%; animation-delay: -4s; animation-duration:12s; }
        .floaty:nth-child(8)  { top: 50%; left: 15%; animation-delay: -6s; animation-duration: 7s; }
        @keyframes float {
            0%   { transform: translateY(0)    rotate(0deg); }
            100% { transform: translateY(-20px) rotate(8deg); }
        }

        /* Card */
        .login-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
        }

        .login-card {
            background: rgba(255, 255, 255, .06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,.15);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 60px rgba(0,0,0,.5);
        }

        /* Logo */
        .logo-ring {
            width: 64px; height: 64px;
            border-radius: 18px;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: #fff;
            margin: 0 auto 1.25rem;
            box-shadow: 0 8px 24px rgba(37,99,235,.4);
        }

        h1 {
            color: #fff;
            font-size: 1.45rem;
            font-weight: 700;
            margin-bottom: .25rem;
            text-align: center;
        }
        .subtitle {
            color: rgba(255,255,255,.5);
            font-size: .85rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        /* Inputs */
        .field { margin-bottom: 1.1rem; }
        .field label {
            display: block;
            color: rgba(255,255,255,.7);
            font-size: .82rem;
            font-weight: 500;
            margin-bottom: .4rem;
            letter-spacing: .02em;
            text-transform: uppercase;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap i {
            position: absolute;
            left: .9rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,.35);
            font-size: 1rem;
            pointer-events: none;
        }
        .input-wrap input {
            width: 100%;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.15);
            border-radius: 10px;
            color: #fff;
            padding: .7rem .9rem .7rem 2.5rem;
            font-size: .95rem;
            transition: border-color .2s, background .2s, box-shadow .2s;
            outline: none;
        }
        .input-wrap input::placeholder { color: rgba(255,255,255,.25); }
        .input-wrap input:focus {
            border-color: rgba(99,102,241,.7);
            background: rgba(255,255,255,.12);
            box-shadow: 0 0 0 3px rgba(99,102,241,.2);
        }
        .input-wrap input:-webkit-autofill,
        .input-wrap input:-webkit-autofill:focus {
            -webkit-text-fill-color: #fff;
            -webkit-box-shadow: 0 0 0 100px #1e1b4b inset;
            transition: background-color 9999s;
        }

        /* Button */
        .btn-signin {
            width: 100%;
            margin-top: .5rem;
            padding: .8rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            color: #fff;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: .02em;
            transition: opacity .2s, transform .15s, box-shadow .2s;
            box-shadow: 0 4px 20px rgba(37,99,235,.4);
        }
        .btn-signin:hover  { opacity: .92; transform: translateY(-1px); box-shadow: 0 8px 28px rgba(37,99,235,.5); }
        .btn-signin:active { transform: translateY(0); }

        /* Alerts */
        .alert-glass {
            border-radius: 10px;
            padding: .65rem .9rem;
            font-size: .85rem;
            display: flex;
            align-items: center;
            gap: .5rem;
            margin-bottom: 1.25rem;
        }
        .alert-glass.danger {
            background: rgba(239,68,68,.15);
            border: 1px solid rgba(239,68,68,.3);
            color: #fca5a5;
        }
        .alert-glass.success {
            background: rgba(34,197,94,.12);
            border: 1px solid rgba(34,197,94,.25);
            color: #86efac;
        }
    </style>
</head>
<body>

<div class="aurora">
    <div class="aurora-blob"></div>
    <div class="aurora-blob"></div>
    <div class="aurora-blob"></div>
</div>

<div class="floaties">
    <span class="floaty">📚</span>
    <span class="floaty">✏️</span>
    <span class="floaty">📐</span>
    <span class="floaty">🎒</span>
    <span class="floaty">📝</span>
    <span class="floaty">🖊️</span>
    <span class="floaty">📓</span>
    <span class="floaty">🔬</span>
</div>

<div class="login-wrap">
    <div class="login-card">

        <div class="logo-ring">
            <i class="bi bi-journal-text"></i>
        </div>
        <h1>LibeHub</h1>
        <p class="subtitle">Sign in to your account</p>

        {% if error %}
        <div class="alert-glass danger">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        {% if logout %}
        <div class="alert-glass success">
            <i class="bi bi-check-circle-fill"></i>
            <span>You have been signed out.</span>
        </div>
        {% endif %}

        <form action="/login" method="post">
            <div class="field">
                <label for="username">Username</label>
                <div class="input-wrap">
                    <i class="bi bi-person"></i>
                    <input id="username" type="text" name="username"
                           autocomplete="username" placeholder="your.name" autofocus required>
                </div>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <i class="bi bi-lock"></i>
                    <input id="password" type="password" name="password"
                           autocomplete="current-password" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn-signin">Sign in</button>
        </form>

    </div>
</div>

</body>
</html>
