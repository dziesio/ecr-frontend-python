<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Change Password — LibeHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>body { background: #f1f5f9; }</style>
</head>
<body>

{% include "fragments/navbar.html" %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-sm-10 col-md-7 col-lg-5">

            {% if user.force_password_change %}
            <div class="alert alert-warning d-flex align-items-start gap-2 mb-4">
                <i class="bi bi-exclamation-triangle-fill fs-5 flex-shrink-0 mt-1"></i>
                <div><strong>Password change required.</strong><br>Please set a new password before continuing.</div>
            </div>
            {% endif %}

            {% if error %}
            <div class="alert alert-danger d-flex align-items-center gap-2 mb-4">
                <i class="bi bi-x-circle-fill"></i><span>{{ error }}</span>
            </div>
            {% endif %}
            {% if success %}
            <div class="alert alert-success d-flex align-items-center gap-2 mb-4">
                <i class="bi bi-check-circle-fill"></i><span>{{ success }}</span>
            </div>
            {% endif %}

            <div class="rounded-4 mb-4 p-4 text-white d-flex align-items-center gap-3"
                 style="background: linear-gradient(135deg, #1e1b4b 0%, #2563eb 100%);">
                <i class="bi bi-key fs-4 opacity-75"></i>
                <h5 class="fw-bold mb-0">Change Password</h5>
            </div>

            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-body p-4">
                    <form action="/profile/password" method="post">
                        <div class="mb-3">
                            <label for="currentPassword" class="form-label fw-medium">Current password</label>
                            <input id="currentPassword" type="password" name="currentPassword"
                                   class="form-control" autocomplete="current-password" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="newPassword" class="form-label fw-medium">New password
                                <span class="text-muted fw-normal small">— min. 8 characters</span>
                            </label>
                            <input id="newPassword" type="password" name="newPassword"
                                   class="form-control" autocomplete="new-password" minlength="8" required>
                        </div>
                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label fw-medium">Confirm new password</label>
                            <input id="confirmPassword" type="password" name="confirmPassword"
                                   class="form-control" autocomplete="new-password" minlength="8" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-medium">Update password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
